# ─────────────────────────────────────────────────────────────────
# General
# ─────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -g history-limit 10000
set -g mouse on
set -sg escape-time 0          # no delay when pressing Escape
set -g base-index 1            # start window numbering at 1
setw -g pane-base-index 1      # start pane numbering at 1
set -g renumber-windows on     # renumber windows when one is closed

# ─────────────────────────────────────────────────────────────────
# Prefix key: Ctrl+B (default)
# ─────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────
# Reload config
# ─────────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "  Config reloaded!"

# ─────────────────────────────────────────────────────────────────
# Splits  (open in current directory)
# ─────────────────────────────────────────────────────────────────
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ─────────────────────────────────────────────────────────────────
# Pane navigation  (arrow keys)
# ─────────────────────────────────────────────────────────────────
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# ─────────────────────────────────────────────────────────────────
# Pane resize  (hold prefix and repeat key)
# ─────────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r C-Left  resize-pane -L 5
bind -r C-Down  resize-pane -D 5
bind -r C-Up    resize-pane -U 5
bind -r C-Right resize-pane -R 5

# ─────────────────────────────────────────────────────────────────
# Copy mode  (vim-style)
# ─────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ─────────────────────────────────────────────────────────────────
# Help cheatsheet popup  (press prefix + ?)
# ─────────────────────────────────────────────────────────────────
bind ? display-popup -E -w 64 -h 36 "bash ~/Projects/dotfiles/scripts/bash/myhelp.sh tmux | less -R"

# ─────────────────────────────────────────────────────────────────
# Status bar
# ─────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 30
set -g status-right-length 50

set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"
set -g status-right "#[fg=#6c7086] %a %d %b  #[fg=#cdd6f4]%H:%M "

set -g window-status-format         " #I:#W "
set -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold] #I:#W "
set -g window-status-style          "fg=#6c7086"

set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

set -g message-style "bg=#313244,fg=#cdd6f4"

# ─────────────────────────────────────────────────────────────────
# Plugins  (managed via tpm, installed with brew)
# ─────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'   # sensible defaults
set -g @plugin 'tmux-plugins/tmux-resurrect'  # persist sessions across reboots
set -g @plugin 'tmux-plugins/tmux-continuum'  # auto-save sessions every 15 min
set -g @plugin 'tmux-plugins/tmux-yank'       # system clipboard integration

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

run '~/.config/tmux/plugins/tpm/tpm'
